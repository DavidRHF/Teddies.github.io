<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reservation Received | Teddies Restaurant</title>

    <meta name="description" content="Your reservation request has been received by Teddies Restaurant. We'll be in touch soon!">

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            background:linear-gradient(135deg,#fff7ec,#ffffff);
        }

        .success-box{
            max-width:600px;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            background:white;
        }

        .success-emoji{
            font-size:4rem;
            margin-bottom:20px;
        }

        h1{
            font-family:'Playfair Display', serif;
            color:#8B5E3C;
            margin-bottom:10px;
        }

        p{
            color:#444;
            margin-bottom:25px;
        }
    </style>

</head>

<body>

<div class="success-box">

    <div class="success-emoji">🐻✅</div>

    <h1>Reservation Received!</h1>

    <p>
        Thank you for booking with <strong>Teddies Restaurant</strong>.<br>
        Our team has received your request and will contact you shortly to confirm your table.
    </p>

    <p>
        We can’t wait to welcome you to our cozy woodland lodge.
    </p>

    <a href="index.html" class="btn btn-primary">Return Home</a>
    <a href="menu.html" class="btn btn-secondary">View Menu</a>

</div>

</body>
</html>
